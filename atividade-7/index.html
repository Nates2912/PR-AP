<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <header>
            <div class="logo-texto">
                NOTAS<span class="ponto-coral">.</span>
            </div>
        </header>

        <h2>Boletim do Aluno</h2>

        <div class="inputs">
            <input type="number" id="nota1" placeholder="Primeira nota" step="0.1">
            <input type="number" id="nota2" placeholder="Segunda nota" step="0.1">
            <input type="number" id="nota3" placeholder="Terceira nota" step="0.1">
            
            <button onclick="notas()">CALCULAR MÉDIA</button>
        </div>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
